    <script type="text/javascript">
        // Close all navbar menus when viewport crosses the mobile/desktop breakpoint
        (function() {
            var mobileBreakpoint = 768;
            var wasMobile = window.innerWidth < mobileBreakpoint;
            
            function closeAllNavbarMenus() {
                // Close Bootstrap collapse (mobile hamburger menu)
                var navbarCollapse = document.getElementById('navbar');
                if (navbarCollapse) {
                    var bsCollapse = bootstrap.Collapse.getInstance(navbarCollapse);
                    if (bsCollapse) {
                        bsCollapse.hide();
                    } else {
                        navbarCollapse.classList.remove('show');
                    }
                }
                
                // Close Bootstrap dropdown (desktop Applications menu)
                var dropdownToggle = document.getElementById('applicationAnchor');
                if (dropdownToggle) {
                    var bsDropdown = bootstrap.Dropdown.getInstance(dropdownToggle);
                    if (bsDropdown) {
                        bsDropdown.hide();
                    }
                }
                // Also remove show class from dropdown menu container
                var dropdownMenu = document.getElementById('menu_desktop');
                if (dropdownMenu) {
                    dropdownMenu.classList.remove('show');
                }
                var dropdownParent = document.getElementById('headerMenuDropdown');
                if (dropdownParent) {
                    dropdownParent.classList.remove('show');
                }
            }
            
            window.addEventListener('resize', function() {
                var isMobile = window.innerWidth < mobileBreakpoint;
                // If we crossed the breakpoint, close all menus
                if (isMobile !== wasMobile) {
                    closeAllNavbarMenus();
                    wasMobile = isMobile;
                }
            });
        })();

        //load the menu with the sites in /sites.txt
        $(document).ready(function () {
                var fileSites = new XMLHttpRequest();
                var arrSites;
                var timeDayHourMinute = String(new Date().getDate()) + '-' + String(new Date().getHours()) + '-' + String(new Date().getMinutes());

                fileSites.open('get', "/sites.txt" + '?v=' + timeDayHourMinute, false);
                fileSites.send(null);

                arrSites = JSON.parse(fileSites.responseText);

                arrSites.sort(function (a, b) {
                    if (a.name > b.name) { return 1 }
                    if (a.name < b.name) { return -1 }
                    return 0;
                });

            for (i = 0; i < arrSites.length; i++) {
                var linkHtml = '<a class="dropdown-item" href="' + arrSites[i].url + '">' + arrSites[i].name + '</a>';
                $('#menu_mobile').append('<li class="visible-xs-block">' + linkHtml + '</li>');
                $('#menu_desktop').append('<li>' + linkHtml + '</li>');
                if ($('#menu_index').length) {
                    // Directly add style for color to the <a> tag for menu_index links
                    $('#menu_index').append('<li>' + linkHtml.replace('<a ', '<a style="color:#337ab7;" ') + '</li>');
                }
            }
            });
    </script>
